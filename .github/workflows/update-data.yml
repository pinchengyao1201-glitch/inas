name: Update live data

on:
  schedule:
    - cron: "30 11 * * 1-5"   # 11:30 UTC, weekdays (after US data releases)
  workflow_dispatch: {}        # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh data points
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python3 scripts/update_data.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain index.html inas.html)" ]; then
            git add index.html inas.html
            git commit -m "chore: refresh live data ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "No data changes."
          fi
